{% extends "layouts/base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<section class="auth-page single">
    <div class="login-container">
        <h2>Reset password</h2>
        <form method="POST">
            <label>
                Username
                <input type="text" name="username" placeholder="Account username" required>
            </label>
            <label>
                Email
                <input type="email" name="email" placeholder="Account email, if available">
            </label>
            <label>
                New password
                <span class="password-row">
                    <input id="new_password" type="password" name="new_password" placeholder="New password" required>
                    <button class="ghost-btn" type="button" data-toggle-password="new_password">View</button>
                </span>
            </label>
            <label>
                Confirm password
                <span class="password-row">
                    <input id="confirm_password" type="password" name="confirm_password" placeholder="Confirm password" required>
                    <button class="ghost-btn" type="button" data-toggle-password="confirm_password">View</button>
                </span>
            </label>
            <button type="submit">Save new password</button>
        </form>
        <div class="form-links">
            <a href="{{ url_for('auth.login') }}">Back to login</a>
        </div>
    </div>
</section>
<script>
document.querySelectorAll("[data-toggle-password]").forEach(function(button) {
    button.addEventListener("click", function() {
        const field = document.getElementById(button.dataset.togglePassword);
        const showing = field.type === "text";
        field.type = showing ? "password" : "text";
        button.textContent = showing ? "View" : "Hide";
    });
});
</script>
{% endblock %}
