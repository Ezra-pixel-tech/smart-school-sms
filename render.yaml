services:
  - type: web
    name: smart-schools-sms
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    disk:
      name: smart-schools-uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: SESSION_LIFETIME_MINUTES
        value: "480"
      - key: LOGIN_RATE_LIMIT_ATTEMPTS
        value: "5"
      - key: LOGIN_RATE_LIMIT_WINDOW_SECONDS
        value: "900"
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PARENT_REPORT_FEE
        value: "10.00"
      - key: PAYSTACK_CURRENCY
        value: "GHS"
