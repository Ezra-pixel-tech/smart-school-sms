services:
  - type: web
    name: smart-schools-sms
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    disk:
      name: smart-schools-uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
